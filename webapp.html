<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>VapeCloud — Premium Store</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --neon: #00f5d4;
    --neon2: #7c3aed;
    --neon3: #f59e0b;
    --bg: #050810;
    --card: rgba(255,255,255,0.04);
    --border: rgba(0,245,212,0.15);
    --text: #e2e8f0;
    --muted: rgba(226,232,240,0.5);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    cursor: default;
  }

  /* ── CANVAS BG ── */
  #bg-canvas {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
  }

  /* ── WRAPPER ── */
  .app {
    position: relative;
    z-index: 1;
    max-width: 430px;
    margin: 0 auto;
    padding: 0 0 100px;
  }

  /* ── HERO ── */
  .hero {
    padding: 48px 24px 32px;
    text-align: center;
    position: relative;
  }

  .hero-eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--neon);
    background: rgba(0,245,212,0.08);
    border: 1px solid rgba(0,245,212,0.2);
    padding: 6px 16px;
    border-radius: 100px;
    margin-bottom: 20px;
    opacity: 0;
    animation: fadeUp 0.6s 0.2s ease forwards;
  }

  .hero-eyebrow::before {
    content: '';
    width: 6px; height: 6px;
    background: var(--neon);
    border-radius: 50%;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%,100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(1.4); }
  }

  .hero-logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 72px;
    letter-spacing: 6px;
    line-height: 1;
    background: linear-gradient(135deg, #fff 0%, var(--neon) 50%, #7c3aed 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 8px;
    opacity: 0;
    animation: fadeUp 0.7s 0.4s ease forwards;
    filter: drop-shadow(0 0 40px rgba(0,245,212,0.3));
  }

  .hero-sub {
    font-size: 13px;
    font-weight: 300;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 28px;
    opacity: 0;
    animation: fadeUp 0.7s 0.55s ease forwards;
  }

  /* ── 3D DEVICE ── */
  .device-wrap {
    width: 180px;
    height: 180px;
    margin: 0 auto 32px;
    perspective: 600px;
    opacity: 0;
    animation: fadeIn 1s 0.7s ease forwards;
  }

  .device-3d {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    animation: spin3d 8s linear infinite;
  }

  @keyframes spin3d {
    0%   { transform: rotateY(0deg) rotateX(15deg); }
    100% { transform: rotateY(360deg) rotateX(15deg); }
  }

  .device-face {
    position: absolute;
    width: 60px;
    border-radius: 12px;
  }

  .face-main {
    width: 64px;
    height: 160px;
    background: linear-gradient(160deg, #1e2035, #0d0f1e);
    border: 1px solid rgba(0,245,212,0.4);
    border-radius: 18px;
    left: 50%;
    top: 50%;
    transform: translateX(-50%) translateY(-50%) translateZ(32px);
    box-shadow: 0 0 30px rgba(0,245,212,0.25), inset 0 1px 0 rgba(255,255,255,0.1);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    overflow: hidden;
  }

  .face-main::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 50%;
    background: linear-gradient(180deg, rgba(0,245,212,0.08), transparent);
    border-radius: 18px 18px 0 0;
  }

  .vape-led {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--neon);
    box-shadow: 0 0 12px var(--neon), 0 0 24px var(--neon);
    animation: ledBlink 1.8s ease-in-out infinite;
  }

  @keyframes ledBlink {
    0%,100% { opacity: 1; box-shadow: 0 0 12px var(--neon), 0 0 24px var(--neon); }
    50% { opacity: 0.3; box-shadow: none; }
  }

  .vape-screen {
    width: 36px; height: 44px;
    background: linear-gradient(135deg, #0d1f3c, #061529);
    border-radius: 6px;
    border: 1px solid rgba(0,245,212,0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 9px;
    color: var(--neon);
    font-weight: 700;
    letter-spacing: 1px;
    text-shadow: 0 0 8px var(--neon);
  }

  .vape-btn {
    width: 20px; height: 5px;
    background: rgba(0,245,212,0.3);
    border-radius: 3px;
    border: 1px solid rgba(0,245,212,0.4);
  }

  .face-side {
    width: 20px;
    height: 160px;
    background: linear-gradient(180deg, #141625, #0a0c1a);
    border: 1px solid rgba(0,245,212,0.15);
    border-radius: 6px;
    position: absolute;
    top: 50%;
    transform: translateY(-50%) translateX(-50%) rotateY(90deg) translateZ(32px);
    left: 50%;
    box-shadow: inset -4px 0 12px rgba(0,0,0,0.6);
  }

  /* ── SMOKE PARTICLES ── */
  .smoke-container {
    position: absolute;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    width: 200px;
    height: 200px;
    pointer-events: none;
    overflow: visible;
  }

  .smoke-particle {
    position: absolute;
    bottom: 0;
    left: 50%;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,255,255,0.12), transparent);
    animation: smokeRise var(--dur) ease-out infinite;
    animation-delay: var(--delay);
    opacity: 0;
  }

  @keyframes smokeRise {
    0%   { transform: translateX(-50%) translateY(0) scale(0.3); opacity: 0.6; }
    60%  { opacity: 0.25; }
    100% { transform: translateX(calc(-50% + var(--dx))) translateY(-180px) scale(2.5); opacity: 0; }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  /* ── STATS ROW ── */
  .stats {
    display: flex;
    justify-content: center;
    gap: 0;
    padding: 0 24px;
    margin-bottom: 32px;
    opacity: 0;
    animation: fadeUp 0.7s 0.9s ease forwards;
  }

  .stat-item {
    flex: 1;
    text-align: center;
    padding: 16px 8px;
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
  }

  .stat-item:first-child {
    border-left: 1px solid var(--border);
    border-radius: 12px 0 0 12px;
  }

  .stat-item:last-child {
    border-right: 1px solid var(--border);
    border-radius: 0 12px 12px 0;
  }

  .stat-item + .stat-item {
    border-left: 1px solid var(--border);
  }

  .stat-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    color: var(--neon);
    letter-spacing: 2px;
    line-height: 1;
    text-shadow: 0 0 20px rgba(0,245,212,0.4);
  }

  .stat-label {
    font-size: 10px;
    font-weight: 400;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 4px;
  }

  /* ── SECTION TITLE ── */
  .section-title {
    padding: 0 24px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    opacity: 0;
    animation: fadeUp 0.6s 1.0s ease forwards;
  }

  .section-title h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 3px;
    color: #fff;
  }

  .see-all {
    font-size: 12px;
    font-weight: 500;
    color: var(--neon);
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    opacity: 0.7;
    transition: opacity 0.2s;
  }

  .see-all:hover { opacity: 1; }

  /* ── PRODUCT CARDS ── */
  .products-scroll {
    overflow-x: auto;
    padding: 0 24px 16px;
    display: flex;
    gap: 14px;
    scrollbar-width: none;
    opacity: 0;
    animation: fadeUp 0.7s 1.1s ease forwards;
  }

  .products-scroll::-webkit-scrollbar { display: none; }

  .product-card {
    flex-shrink: 0;
    width: 160px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1), border-color 0.3s, box-shadow 0.3s;
    position: relative;
  }

  .product-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(0,245,212,0.06), transparent 60%);
    border-radius: 20px;
    opacity: 0;
    transition: opacity 0.3s;
  }

  .product-card:hover {
    transform: translateY(-6px) scale(1.02);
    border-color: rgba(0,245,212,0.4);
    box-shadow: 0 20px 40px rgba(0,0,0,0.4), 0 0 30px rgba(0,245,212,0.1);
  }

  .product-card:hover::before { opacity: 1; }

  .product-card:active { transform: scale(0.97); }

  .card-img {
    height: 130px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  .card-device {
    width: 44px;
    height: 100px;
    border-radius: 12px;
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-end;
    padding-bottom: 12px;
    transition: transform 0.4s ease;
  }

  .product-card:hover .card-device { transform: rotateY(20deg) rotateX(-5deg) scale(1.1); }

  .card-device-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    animation: pulse 2s infinite;
  }

  .card-glow {
    position: absolute;
    width: 80px; height: 80px;
    border-radius: 50%;
    filter: blur(20px);
    opacity: 0.4;
    transition: opacity 0.3s;
  }

  .product-card:hover .card-glow { opacity: 0.7; }

  .card-body {
    padding: 12px 14px 14px;
  }

  .card-tag {
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: 100px;
    margin-bottom: 6px;
    display: inline-block;
  }

  .card-name {
    font-weight: 600;
    font-size: 14px;
    line-height: 1.3;
    margin-bottom: 8px;
    color: #fff;
  }

  .card-price-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .card-price {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 1px;
  }

  .card-add {
    width: 28px; height: 28px;
    border-radius: 8px;
    border: none;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    font-size: 16px;
    font-weight: 300;
    transition: transform 0.2s, filter 0.2s;
    color: #050810;
  }

  .card-add:hover { transform: scale(1.15); filter: brightness(1.2); }
  .card-add:active { transform: scale(0.9); }

  /* ── FLAVOR SECTION ── */
  .flavors-section {
    padding: 8px 24px;
    opacity: 0;
    animation: fadeUp 0.6s 1.2s ease forwards;
  }

  .flavors-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 3px;
    margin-bottom: 14px;
  }

  .flavors-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
  }

  .flavor-pill {
    padding: 14px 10px;
    border-radius: 16px;
    text-align: center;
    cursor: pointer;
    border: 1px solid rgba(255,255,255,0.06);
    transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.25s;
    position: relative;
    overflow: hidden;
  }

  .flavor-pill::after {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0.05);
    opacity: 0;
    transition: opacity 0.2s;
  }

  .flavor-pill:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.4); }
  .flavor-pill:hover::after { opacity: 1; }
  .flavor-pill:active { transform: scale(0.95); }

  .flavor-emoji { font-size: 22px; display: block; margin-bottom: 5px; }

  .flavor-name {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.5px;
    color: rgba(255,255,255,0.85);
  }

  /* ── PROMO BANNER ── */
  .promo-banner {
    margin: 20px 24px;
    padding: 20px 22px;
    background: linear-gradient(135deg, rgba(124,58,237,0.3), rgba(0,245,212,0.15));
    border: 1px solid rgba(124,58,237,0.3);
    border-radius: 20px;
    position: relative;
    overflow: hidden;
    opacity: 0;
    animation: fadeUp 0.6s 1.3s ease forwards;
  }

  .promo-banner::before {
    content: '';
    position: absolute;
    top: -30px; right: -30px;
    width: 120px; height: 120px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(124,58,237,0.4), transparent);
  }

  .promo-tag {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--neon3);
    margin-bottom: 6px;
  }

  .promo-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px;
    letter-spacing: 2px;
    line-height: 1;
    color: #fff;
    margin-bottom: 6px;
  }

  .promo-desc {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 14px;
    max-width: 200px;
  }

  .promo-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: #050810;
    background: var(--neon);
    padding: 8px 18px;
    border-radius: 100px;
    border: none;
    cursor: pointer;
    transition: transform 0.2s, filter 0.2s;
  }

  .promo-btn:hover { transform: scale(1.04); filter: brightness(1.1); }

  /* ── BOTTOM CTA ── */
  .bottom-cta {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    padding: 16px 24px;
    background: linear-gradient(0deg, #050810 70%, transparent);
    z-index: 10;
  }

  .cta-btn {
    width: 100%;
    padding: 16px;
    border: none;
    border-radius: 16px;
    background: linear-gradient(135deg, var(--neon), #00b8a9);
    color: #050810;
    font-family: 'Outfit', sans-serif;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    transition: transform 0.2s cubic-bezier(0.34,1.56,0.64,1), filter 0.2s;
    box-shadow: 0 8px 30px rgba(0,245,212,0.35);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }

  .cta-btn:hover { transform: translateY(-2px) scale(1.01); filter: brightness(1.08); }
  .cta-btn:active { transform: scale(0.98); }

  .cta-icon {
    width: 22px; height: 22px;
    background: rgba(5,8,16,0.2);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px;
  }

  /* ── NOTIFICATION ── */
  .notification {
    position: fixed;
    top: 20px; left: 50%;
    transform: translateX(-50%) translateY(-80px);
    background: rgba(0,245,212,0.15);
    border: 1px solid rgba(0,245,212,0.35);
    backdrop-filter: blur(12px);
    color: var(--neon);
    padding: 10px 20px;
    border-radius: 100px;
    font-size: 13px;
    font-weight: 500;
    white-space: nowrap;
    z-index: 100;
    transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
  }

  .notification.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<div class="notification" id="notif">✓ Добавлено в корзину</div>

<div class="app">

  <!-- HERO -->
  <div class="hero">
    <div class="smoke-container" id="smoke-container"></div>

    <div class="hero-eyebrow">🔥 Premium Vape Store</div>
    <div class="hero-logo">VAPE<br>CLOUD</div>
    <div class="hero-sub">Next Level Experience</div>

    <div class="device-wrap">
      <div class="device-3d">
        <div class="face-main">
          <div class="vape-led"></div>
          <div class="vape-screen">58W</div>
          <div class="vape-btn"></div>
        </div>
        <div class="face-side"></div>
      </div>
    </div>
  </div>

  <!-- STATS -->
  <div class="stats">
    <div class="stat-item">
      <div class="stat-num" data-target="50">0</div>
      <div class="stat-label">Вкусов</div>
    </div>
    <div class="stat-item">
      <div class="stat-num" data-target="12">0</div>
      <div class="stat-label">Брендов</div>
    </div>
    <div class="stat-item">
      <div class="stat-num" data-target="4800">0</div>
      <div class="stat-label">Клиентов</div>
    </div>
  </div>

  <!-- PRODUCTS -->
  <div class="section-title">
    <h2>Хиты продаж</h2>
    <span class="see-all">Все →</span>
  </div>

  <div class="products-scroll" id="products"></div>

  <!-- PROMO -->
  <div class="promo-banner">
    <div class="promo-tag">🎁 Акция недели</div>
    <div class="promo-title">Скидка<br>20% OFF</div>
    <div class="promo-desc">На всё одноразовые поды при заказе от 2 шт.</div>
    <button class="promo-btn">Получить скидку ↗</button>
  </div>

  <!-- FLAVORS -->
  <div class="flavors-section">
    <div class="flavors-title">Популярные вкусы</div>
    <div class="flavors-grid" id="flavors"></div>
  </div>

</div>

<!-- BOTTOM CTA -->
<div class="bottom-cta">
  <button class="cta-btn" id="main-cta">
    <div class="cta-icon">🛒</div>
    Смотреть весь каталог
  </button>
</div>

<script>
// ── TELEGRAM INIT ──
const tg = window.Telegram?.WebApp;
if (tg) {
  tg.ready();
  tg.expand();
  tg.setHeaderColor('#050810');
  tg.setBackgroundColor('#050810');
}

// ── CANVAS PARTICLES ──
const canvas = document.getElementById('bg-canvas');
const ctx = canvas.getContext('2d');
let W, H, particles = [];

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

class Particle {
  constructor() { this.reset(); }
  reset() {
    this.x = Math.random() * W;
    this.y = Math.random() * H;
    this.r = Math.random() * 1.5 + 0.3;
    this.vx = (Math.random() - 0.5) * 0.3;
    this.vy = -Math.random() * 0.4 - 0.1;
    this.alpha = Math.random() * 0.5 + 0.1;
    this.color = Math.random() > 0.5 ? '0,245,212' : '124,58,237';
  }
  update() {
    this.x += this.vx;
    this.y += this.vy;
    if (this.y < -10) this.reset();
  }
  draw() {
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${this.color},${this.alpha})`;
    ctx.fill();
  }
}

for (let i = 0; i < 100; i++) particles.push(new Particle());

function drawGrid() {
  ctx.strokeStyle = 'rgba(0,245,212,0.03)';
  ctx.lineWidth = 1;
  const step = 60;
  for (let x = 0; x < W; x += step) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
  for (let y = 0; y < H; y += step) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }
}

function loop() {
  ctx.clearRect(0, 0, W, H);
  drawGrid();
  particles.forEach(p => { p.update(); p.draw(); });
  requestAnimationFrame(loop);
}
loop();

// ── SMOKE PARTICLES ──
const sc = document.getElementById('smoke-container');
for (let i = 0; i < 8; i++) {
  const s = document.createElement('div');
  s.className = 'smoke-particle';
  const size = 20 + Math.random() * 30;
  s.style.cssText = `
    width:${size}px; height:${size}px;
    --dur:${2.5 + Math.random() * 2}s;
    --delay:${-Math.random() * 3}s;
    --dx:${(Math.random() - 0.5) * 60}px;
  `;
  sc.appendChild(s);
}

// ── COUNTER ANIMATION ──
function animateCount(el, target) {
  let current = 0;
  const step = target / 40;
  const isLarge = target >= 1000;
  const int = setInterval(() => {
    current = Math.min(current + step, target);
    el.textContent = isLarge
      ? Math.round(current).toLocaleString('ru')
      : Math.round(current);
    if (current >= target) clearInterval(int);
  }, 30);
}

setTimeout(() => {
  document.querySelectorAll('[data-target]').forEach(el => {
    animateCount(el, parseInt(el.dataset.target));
  });
}, 900);

// ── NOTIFICATION ──
let notifTimer;
function showNotif(msg) {
  const n = document.getElementById('notif');
  n.textContent = msg;
  n.classList.add('show');
  clearTimeout(notifTimer);
  notifTimer = setTimeout(() => n.classList.remove('show'), 2500);
}

function addToCart(e, name) {
  e.stopPropagation();
  const btn = e.currentTarget;
  btn.style.transform = 'scale(0.7)';
  setTimeout(() => btn.style.transform = '', 200);
  showNotif(`✓ ${name} — в корзине`);
  if (tg) tg.HapticFeedback?.impactOccurred('medium');
}

// ── CTA ──
document.getElementById('main-cta').addEventListener('click', () => {
  if (tg) {
    tg.HapticFeedback?.impactOccurred('medium');
    tg.sendData(JSON.stringify({ action: 'open_catalog' }));
  }
  showNotif('🛒 Открываем каталог...');
});
