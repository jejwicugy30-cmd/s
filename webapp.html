<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
    <title>CloudLab Store</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --primary: #a8ff47;
            --primary-dark: #7a9d2d;
            --secondary: #7b6ef6;
            --bg: #0a0a12;
            --bg-light: #141420;
            --bg-lighter: #1a1a24;
            --border: rgba(255, 255, 255, 0.1);
            --border-light: rgba(255, 255, 255, 0.05);
            --text: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.6);
            --text-dim: rgba(255, 255, 255, 0.4);
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.2);
        }

        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
        }

        /* === CONTAINER === */
        .container {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: var(--bg);
        }

        /* === PAGES === */
        .page {
            display: none;
            flex: 1;
            overflow: hidden;
            flex-direction: column;
        }

        .page.active {
            display: flex;
        }

        .content {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding: 16px;
        }

        .content::-webkit-scrollbar {
            width: 6px;
        }

        .content::-webkit-scrollbar-track {
            background: transparent;
        }

        .content::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }

        /* === HEADER === */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 16px;
            border-bottom: 1px solid var(--border-light);
            background: var(--bg-light);
            flex-shrink: 0;
        }

        .header-title {
            font-size: 18px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .header-actions {
            display: flex;
            gap: 8px;
        }

        /* === BUTTONS === */
        .btn {
            padding: 10px 16px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            min-height: 44px;
        }

        .btn-primary {
            background: var(--primary);
            color: var(--bg);
            font-weight: 600;
        }

        .btn-primary:active {
            background: var(--primary-dark);
        }

        .btn-secondary {
            background: var(--bg-lighter);
            color: var(--text);
            border: 1px solid var(--border);
        }

        .btn-secondary:active {
            background: var(--border);
        }

        .btn-icon {
            width: 44px;
            height: 44px;
            padding: 0;
            border-radius: 8px;
            background: var(--bg-lighter);
            border: 1px solid var(--border);
            color: var(--text);
            font-size: 18px;
        }

        .btn-icon:active {
            background: var(--border);
        }

        /* === STORE PAGE === */
        .store-header {
            margin-bottom: 20px;
        }

        .store-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .store-subtitle {
            color: var(--text-muted);
            font-size: 13px;
        }

        .products-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        .product-card {
            background: var(--bg-lighter);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
        }

        .product-card:active {
            transform: scale(0.98);
            background: var(--border);
        }

        .product-name {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 4px;
            line-height: 1.2;
        }

        .product-desc {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 8px;
            flex: 1;
            line-height: 1.3;
        }

        .product-price {
            font-size: 16px;
            font-weight: 700;
            color: var(--primary);
        }

        /* === MODAL === */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            align-items: flex-end;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--bg-light);
            width: 100%;
            border-radius: 20px 20px 0 0;
            padding: 20px;
            max-height: 80vh;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                transform: translateY(100%);
            }
            to {
                transform: translateY(0);
            }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .modal-title {
            font-size: 18px;
            font-weight: 600;
        }

        .modal-close {
            background: none;
            border: none;
            color: var(--text);
            font-size: 24px;
            cursor: pointer;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-body {
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-label {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 6px;
            display: block;
            font-weight: 500;
        }

        .form-input {
            width: 100%;
            padding: 12px 14px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-size: 14px;
            font-family: inherit;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .form-textarea {
            width: 100%;
            padding: 12px 14px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-size: 14px;
            font-family: inherit;
            resize: none;
            min-height: 100px;
        }

        .form-textarea:focus {
            outline: none;
            border-color: var(--primary);
        }

        /* === CHAT PAGE === */
        .chat-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .chat-item {
            background: var(--bg-lighter);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .chat-item:active {
            background: var(--border);
        }

        .chat-item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-item-name {
            font-weight: 600;
            font-size: 14px;
        }

        .chat-item-time {
            font-size: 12px;
            color: var(--text-dim);
        }

        .chat-item-preview {
            font-size: 13px;
            color: var(--text-muted);
            line-height: 1.3;
        }

        .chat-container {
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .messages-list {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: 16px;
        }

        .message {
            display: flex;
            gap: 8px;
            margin-bottom: 4px;
        }

        .message.own {
            justify-content: flex-end;
        }

        .message-bubble {
            background: var(--bg-lighter);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 10px 12px;
            max-width: 80%;
            word-wrap: break-word;
            font-size: 14px;
            line-height: 1.4;
        }

        .message.own .message-bubble {
            background: var(--primary);
            color: var(--bg);
            border-color: var(--primary);
        }

        .chat-input-area {
            display: flex;
            gap: 8px;
            padding: 12px 16px;
            border-top: 1px solid var(--border-light);
            background: var(--bg-light);
            flex-shrink: 0;
        }

        .chat-input {
            flex: 1;
            padding: 10px 12px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 14px;
            font-family: inherit;
            max-height: 80px;
            resize: none;
        }

        .chat-input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .chat-send {
            width: 40px;
            height: 40px;
            background: var(--primary);
            border: none;
            border-radius: 8px;
            color: var(--bg);
            cursor: pointer;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.2s ease;
        }

        .chat-send:active {
            background: var(--primary-dark);
        }

        /* === ADMIN CHAT LIST === */
        .admin-chat-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .admin-chat-item {
            background: var(--bg-lighter);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .admin-chat-item:active {
            background: var(--border);
        }

        .admin-chat-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 8px;
        }

        .admin-chat-name {
            font-weight: 600;
            font-size: 15px;
        }

        .admin-chat-id {
            font-size: 12px;
            color: var(--primary);
            background: rgba(168, 255, 71, 0.1);
            padding: 2px 6px;
            border-radius: 4px;
        }

        .admin-chat-preview {
            font-size: 13px;
            color: var(--text-muted);
            line-height: 1.3;
            margin-bottom: 6px;
        }

        .admin-chat-time {
            font-size: 12px;
            color: var(--text-dim);
        }

        /* === NOTIFICATIONS === */
        .notification {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--bg-lighter);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            text-align: center;
            z-index: 2000;
            min-width: 260px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.9);
            }
            to {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }
        }

        .notification-icon {
            font-size: 40px;
            margin-bottom: 12px;
        }

        .notification-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .notification-text {
            font-size: 13px;
            color: var(--text-muted);
        }

        /* === FOOTER === */
        .footer {
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 12px 0;
            border-top: 1px solid var(--border-light);
            background: var(--bg-light);
            flex-shrink: 0;
        }

        .footer-btn {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            padding: 8px;
            color: var(--text-muted);
            background: none;
            border: none;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s ease;
        }

        .footer-btn.active {
            color: var(--primary);
        }

        .footer-btn-icon {
            font-size: 20px;
        }

        /* === RESPONSIVE === */
        @media (max-width: 480px) {
            .content {
                padding: 12px;
            }

            .products-grid {
                grid-template-columns: 1fr;
                gap: 10px;
            }

            .product-card {
                padding: 10px;
            }

            .header {
                padding: 10px 12px;
            }

            .modal-content {
                padding: 16px;
            }

            .store-title {
                font-size: 20px;
            }
        }

        /* === EMPTY STATE === */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            gap: 12px;
            color: var(--text-muted);
        }

        .empty-icon {
            font-size: 48px;
            opacity: 0.5;
        }

        .empty-text {
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- STORE PAGE -->
        <div id="storePage" class="page active">
            <div class="header">
                <div class="header-title">
                    <span>🛍️</span>
                    <span>CloudLab Store</span>
                </div>
                <div class="header-actions">
                    <button class="btn-icon" id="chatBtn" title="Открыть чат">💬</button>
                </div>
            </div>
            <div class="content">
                <div class="store-header">
                    <div class="store-title">Товары</div>
                    <div class="store-subtitle">Выберите товар для заказа</div>
                </div>
                <div class="products-grid" id="productsGrid"></div>
            </div>
            <div class="footer">
                <button class="footer-btn active" data-page="store">
                    <span class="footer-btn-icon">🛍️</span>
                    <span>Магазин</span>
                </button>
                <button class="footer-btn" data-page="chat">
                    <span class="footer-btn-icon">💬</span>
                    <span>Чат</span>
                </button>
                <button class="footer-btn" data-page="orders" id="ordersBtn">
                    <span class="footer-btn-icon">📦</span>
                    <span>Заказы</span>
                </button>
            </div>
        </div>

        <!-- CHAT PAGE -->
        <div id="chatPage" class="page">
            <div class="header">
                <div class="header-title">
                    <span>💬</span>
                    <span>Чат</span>
                </div>
            </div>
            <div id="chatListContainer" class="content">
                <div class="chat-list" id="chatList"></div>
            </div>
            <div class="footer">
                <button class="footer-btn" data-page="store">
                    <span class="footer-btn-icon">🛍️</span>
                    <span>Магазин</span>
                </button>
                <button class="footer-btn active" data-page="chat">
                    <span class="footer-btn-icon">💬</span>
                    <span>Чат</span>
                </button>
                <button class="footer-btn" data-page="orders" id="ordersBtn2">
                    <span class="footer-btn-icon">📦</span>
                    <span>Заказы</span>
                </button>
            </div>
        </div>

        <!-- CHAT CONVERSATION PAGE -->
        <div id="chatConvPage" class="page">
            <div class="header">
                <button class="btn-icon" id="backFromChatBtn">←</button>
                <div class="header-title" id="chatConvTitle"></div>
            </div>
            <div class="chat-container">
                <div class="messages-list" id="messagesList"></div>
                <div class="chat-input-area">
                    <input type="text" class="chat-input" id="chatInput" placeholder="Сообщение...">
                    <button class="chat-send" id="chatSendBtn">→</button>
                </div>
            </div>
        </div>

        <!-- ADMIN CHAT LIST PAGE -->
        <div id="adminChatListPage" class="page">
            <div class="header">
                <div class="header-title">
                    <span>📋</span>
                    <span>Чаты с клиентами</span>
                </div>
            </div>
            <div class="content">
                <div class="admin-chat-list" id="adminChatList"></div>
            </div>
            <div class="footer">
                <button class="footer-btn active" data-page="admin-chats">
                    <span class="footer-btn-icon">📋</span>
                    <span>Чаты</span>
                </button>
                <button class="footer-btn" id="adminProductsBtn">
                    <span class="footer-btn-icon">⚙️</span>
                    <span>Товары</span>
                </button>
            </div>
        </div>

        <!-- ADMIN PRODUCTS PAGE -->
        <div id="adminProductsPage" class="page">
            <div class="header">
                <div class="header-title">
                    <span>⚙️</span>
                    <span>Управление товарами</span>
                </div>
                <button class="btn-icon" id="addProductBtn">+</button>
            </div>
            <div class="content">
                <div id="adminProductsList"></div>
            </div>
            <div class="footer">
                <button class="footer-btn" data-page="admin-chats">
                    <span class="footer-btn-icon">📋</span>
                    <span>Чаты</span>
                </button>
                <button class="footer-btn active" id="adminProductsBtn2">
                    <span class="footer-btn-icon">⚙️</span>
                    <span>Товары</span>
                </button>
            </div>
        </div>

        <!-- ORDERS PAGE -->
        <div id="ordersPage" class="page">
            <div class="header">
                <div class="header-title">
                    <span>📦</span>
                    <span>Мои заказы</span>
                </div>
            </div>
            <div class="content" id="ordersContent"></div>
            <div class="footer">
                <button class="footer-btn" data-page="store">
                    <span class="footer-btn-icon">🛍️</span>
                    <span>Магазин</span>
                </button>
                <button class="footer-btn" data-page="chat">
                    <span class="footer-btn-icon">💬</span>
                    <span>Чат</span>
                </button>
                <button class="footer-btn active" data-page="orders">
                    <span class="footer-btn-icon">📦</span>
                    <span>Заказы</span>
                </button>
            </div>
        </div>
    </div>

    <!-- MODALS -->
    <div id="orderModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title">Оформление заказа</div>
                <button class="modal-close" id="orderModalClose">✕</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <div class="form-label">Товар</div>
                    <div id="modalProductName" style="font-weight: 600; color: var(--primary); padding: 12px; background: var(--bg); border-radius: 8px;"></div>
                </div>
                <div class="form-group">
                    <label class="form-label">Ваше имя</label>
                    <input type="text" class="form-input" id="customerName" placeholder="Введите имя">
                </div>
                <div class="form-group">
                    <label class="form-label">Email или контакт</label>
                    <input type="text" class="form-input" id="customerContact" placeholder="Введите email или номер">
                </div>
                <div class="form-group">
                    <label class="form-label">Комментарий</label>
                    <textarea class="form-textarea" id="orderComment" placeholder="Ваши пожелания..."></textarea>
                </div>
            </div>
            <div style="display: flex; gap: 8px;">
                <button class="btn btn-secondary" id="orderModalClose2" style="flex: 1;">Отмена</button>
                <button class="btn btn-primary" id="submitOrderBtn" style="flex: 1;">Оформить</button>
            </div>
        </div>
    </div>

    <div id="addProductModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title">Добавить товар</div>
                <button class="modal-close" id="addProductClose">✕</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label class="form-label">Название</label>
                    <input type="text" class="form-input" id="productName" placeholder="Название товара">
                </div>
                <div class="form-group">
                    <label class="form-label">Описание</label>
                    <textarea class="form-textarea" id="productDesc" placeholder="Описание товара"></textarea>
                </div>
                <div class="form-group">
                    <label class="form-label">Цена</label>
                    <input type="number" class="form-input" id="productPrice" placeholder="Цена" step="0.01">
                </div>
            </div>
            <div style="display: flex; gap: 8px;">
                <button class="btn btn-secondary" id="addProductClose2" style="flex: 1;">Отмена</button>
                <button class="btn btn-primary" id="saveProductBtn" style="flex: 1;">Добавить</button>
            </div>
        </div>
    </div>

    <script>
        // ===== CONFIGURATION =====
        const ADMIN_ID = 7705124098;
        const APP_STORAGE_KEY = 'cloudlab_data';

        // ===== STATE MANAGEMENT =====
        let appState = {
            currentPage: 'store',
            userId: null,
            isAdmin: false,
            currentChat: null,
            products: [],
            orders: [],
            chats: {},
            messages: {}
        };

        // ===== INITIALIZATION =====
        function initApp() {
            // Initialize Telegram
            if (window.Telegram?.WebApp) {
                const tg = window.Telegram.WebApp;
                tg.ready();
                tg.expand();
                
                const user = tg.initDataUnsafe?.user;
                if (user) {
                    appState.userId = user.id;
                    appState.isAdmin = user.id === ADMIN_ID;
                }
            }

            // Generate userId if not from Telegram
            if (!appState.userId) {
                appState.userId = Math.random().toString(36).substr(2, 9);
            }

            // Load data from storage
            loadData();

            // Initialize default products if empty
            if (appState.products.length === 0) {
                appState.products = [
                    { id: 1, name: 'Облако Pro', desc: 'Мощное облачное решение', price: 999 },
                    { id: 2, name: 'Облако Start', desc: 'Начальный пакет', price: 299 },
                    { id: 3, name: 'VPS сервер', desc: 'Высокопроизводительный VPS', price: 1999 },
                    { id: 4, name: 'CDN сервис', desc: 'Глобальная сеть доставки', price: 599 }
                ];
                saveData();
            }

            // Setup event listeners
            setupEventListeners();

            // Render initial page
            if (appState.isAdmin) {
                showPage('admin-chats');
            } else {
                renderStore();
                showPage('store');
            }
        }

        // ===== DATA MANAGEMENT =====
        function loadData() {
            const data = localStorage.getItem(APP_STORAGE_KEY);
            if (data) {
                const parsed = JSON.parse(data);
                appState = { ...appState, ...parsed };
            }
        }

        function saveData() {
            localStorage.setItem(APP_STORAGE_KEY, JSON.stringify(appState));
        }

        // ===== PAGE NAVIGATION =====
        function showPage(pageName) {
            // Hide all pages
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            
            // Show selected page
            const pageMap = {
                'store': 'storePage',
                'chat': 'chatPage',
                'chat-conv': 'chatConvPage',
                'admin-chats': 'adminChatListPage',
                'admin-products': 'adminProductsPage',
                'orders': 'ordersPage'
            };

            if (pageMap[pageName]) {
                document.getElementById(pageMap[pageName]).classList.add('active');
            }

            appState.currentPage = pageName;

            // Update footer buttons
            if (pageName !== 'chat-conv') {
                document.querySelectorAll('.footer-btn').forEach(btn => {
                    btn.classList.remove('active');
                    if (btn.dataset.page === pageName) {
                        btn.classList.add('active');
                    }
                });
            }

            // Render page content
            if (pageName === 'store') renderStore();
            if (pageName === 'chat') renderChatList();
            if (pageName === 'admin-chats') renderAdminChatList();
            if (pageName === 'admin-products') renderAdminProducts();
            if (pageName === 'orders') renderOrders();
        }

        // ===== STORE PAGE =====
        function renderStore() {
            const grid = document.getElementById('productsGrid');
            grid.innerHTML = '';

            appState.products.forEach(product => {
                const card = document.createElement('div');
                card.className = 'product-card';
                card.innerHTML = `
                    <div class="product-name">${product.name}</div>
                    <div class="product-desc">${product.desc}</div>
                    <div class="product-price">${product.price}₽</div>
                `;
                card.onclick = () => openOrderModal(product);
                grid.appendChild(card);
            });
        }

        // ===== ORDER MODAL =====
        function openOrderModal(product) {
            document.getElementById('modalProductName').textContent = product.name + ' - ' + product.price + '₽';
            document.getElementById('customerName').value = '';
            document.getElementById('customerContact').value = '';
            document.getElementById('orderComment').value = '';
            document.getElementById('orderModal').classList.add('active');
            document.getElementById('orderModal').dataset.productId = product.id;
            document.getElementById('customerName').focus();
        }

        function closeOrderModal() {
            document.getElementById('orderModal').classList.remove('active');
        }

        // ===== CHAT LIST PAGE =====
        function renderChatList() {
            const list = document.getElementById('chatList');
            list.innerHTML = '';

            // Get all chats for this user
            const userChats = Object.entries(appState.chats).filter(([chatId, chat]) => {
                return chat.userId === appState.userId;
            });

            if (userChats.length === 0) {
                list.innerHTML = '<div class="empty-state"><div class="empty-icon">💬</div><div class="empty-text">Нет активных чатов</div></div>';
                return;
            }

            userChats.forEach(([chatId, chat]) => {
                const item = document.createElement('div');
                item.className = 'chat-item';
                const lastMsg = (appState.messages[chatId] || []).slice(-1)[0];
                item.innerHTML = `
                    <div class="chat-item-header">
                        <div class="chat-item-name">CloudLab Support</div>
                        <div class="chat-item-time">${lastMsg ? new Date(lastMsg.time).toLocaleTimeString('ru-RU', {hour: '2-digit', minute: '2-digit'}) : 'Нет сообщений'}</div>
                    </div>
                    <div class="chat-item-preview">${lastMsg ? lastMsg.text.substring(0, 40) : 'Начните разговор'}</div>
                `;
                item.onclick = () => openChat(chatId);
                list.appendChild(item);
            });
        }

        // ===== ADMIN CHAT LIST PAGE =====
        function renderAdminChatList() {
            const list = document.getElementById('adminChatList');
            list.innerHTML = '';

            const allChats = Object.entries(appState.chats);
            if (allChats.length === 0) {
                list.innerHTML = '<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-text">Нет чатов</div></div>';
                return;
            }

            allChats.forEach(([chatId, chat]) => {
                const item = document.createElement('div');
                item.className = 'admin-chat-item';
                const lastMsg = (appState.messages[chatId] || []).slice(-1)[0];
                item.innerHTML = `
                    <div class="admin-chat-header">
                        <div class="admin-chat-name">${chat.userName}</div>
                        <div class="admin-chat-id">ID: ${chat.userId}</div>
                    </div>
                    <div class="admin-chat-preview">${lastMsg ? lastMsg.text.substring(0, 60) : 'Нет сообщений'}</div>
                    <div class="admin-chat-time">${lastMsg ? new Date(lastMsg.time).toLocaleString('ru-RU') : 'Новый чат'}</div>
                `;
                item.onclick = () => openChat(chatId);
                list.appendChild(item);
            });
        }

        // ===== CHAT CONVERSATION =====
        function openChat(chatId) {
            appState.currentChat = chatId;
            renderChatMessages();
            showPage('chat-conv');
        }

        function renderChatMessages() {
            const chatId = appState.currentChat;
            const chat = appState.chats[chatId];
            const messages = appState.messages[chatId] || [];

            if (appState.isAdmin) {
                document.getElementById('chatConvTitle').textContent = chat.userName;
            } else {
                document.getElementById('chatConvTitle').textContent = 'CloudLab Support';
            }

            const list = document.getElementById('messagesList');
            list.innerHTML = '';

            messages.forEach(msg => {
                const msgEl = document.createElement('div');
                msgEl.className = 'message' + (msg.isAdmin === appState.isAdmin ? ' own' : '');
                msgEl.innerHTML = `<div class="message-bubble">${msg.text}</div>`;
                list.appendChild(msgEl);
            });

            // Scroll to bottom
            setTimeout(() => {
                list.scrollTop = list.scrollHeight;
            }, 0);
        }

        function sendMessage() {
            const input = document.getElementById('chatInput');
            const text = input.value.trim();

            if (!text) return;

            const chatId = appState.currentChat;
            if (!appState.messages[chatId]) {
                appState.messages[chatId] = [];
            }

            appState.messages[chatId].push({
                text: text,
                isAdmin: appState.isAdmin,
                time: new Date().toISOString()
            });

            input.value = '';
            renderChatMessages();
            saveData();
        }

        // ===== ADMIN PRODUCTS PAGE =====
        function renderAdminProducts() {
            const list = document.getElementById('adminProductsList');
            list.innerHTML = '';

            appState.products.forEach(product => {
                const item = document.createElement('div');
                item.className = 'admin-chat-item';
                item.style.marginBottom = '8px';
                item.innerHTML = `
                    <div class="admin-chat-header">
                        <div class="admin-chat-name">${product.name}</div>
                        <div class="admin-chat-id">${product.price}₽</div>
                    </div>
                    <div class="admin-chat-preview">${product.desc}</div>
                    <div style="margin-top: 8px; display: flex; gap: 8px;">
                        <button class="btn btn-secondary" style="flex: 1; font-size: 12px;" onclick="deleteProduct(${product.id})">Удалить</button>
                    </div>
                `;
                list.appendChild(item);
            });
        }

        function deleteProduct(productId) {
            if (confirm('Удалить товар?')) {
                appState.products = appState.products.filter(p => p.id !== productId);
                saveData();
                renderAdminProducts();
            }
        }

        // ===== ORDERS PAGE =====
        function renderOrders() {
            const content = document.getElementById('ordersContent');
            const userOrders = appState.orders.filter(o => o.userId === appState.userId);

            if (userOrders.length === 0) {
                content.innerHTML = '<div class="empty-state"><div class="empty-icon">📦</div><div class="empty-text">Нет заказов</div></div>';
                return;
            }

            content.innerHTML = userOrders.map(order => `
                <div class="admin-chat-item" style="margin-bottom: 8px;">
                    <div class="admin-chat-header">
                        <div class="admin-chat-name">${order.productName}</div>
                        <div class="admin-chat-id">${order.price}₽</div>
                    </div>
                    <div class="admin-chat-preview">${order.customerName} - ${order.customerContact}</div>
                    <div class="admin-chat-time">${new Date(order.date).toLocaleString('ru-RU')}</div>
                </div>
            `).join('');
        }

        // ===== NOTIFICATIONS =====
        function showNotification(icon, title, text) {
            const notif = document.createElement('div');
            notif.className = 'notification';
            notif.innerHTML = `
                <div class="notification-icon">${icon}</div>
                <div class="notification-title">${title}</div>
                <div class="notification-text">${text}</div>
            `;
            document.body.appendChild(notif);

            setTimeout(() => {
                notif.remove();
            }, 2000);
        }

        // ===== EVENT LISTENERS =====
        function setupEventListeners() {
            // Footer navigation
            document.querySelectorAll('.footer-btn').forEach(btn => {
                btn.onclick = () => showPage(btn.dataset.page);
            });

            // Store page - chat button
            document.getElementById('chatBtn').onclick = () => showPage('chat');

            // Order modal
            document.getElementById('orderModalClose').onclick = closeOrderModal;
            document.getElementById('orderModalClose2').onclick = closeOrderModal;

            document.getElementById('submitOrderBtn').onclick = () => {
                const productId = parseInt(document.getElementById('orderModal').dataset.productId);
                const product = appState.products.find(p => p.id === productId);
                const name = document.getElementById('customerName').value.trim();
                const contact = document.getElementById('customerContact').value.trim();
                const comment = document.getElementById('orderComment').value.trim();

                if (!name || !contact) {
                    alert('Заполните все поля');
                    return;
                }

                // Create chat for this user if not exists
                const chatId = 'chat_' + appState.userId;
                if (!appState.chats[chatId]) {
                    appState.chats[chatId] = {
                        userId: appState.userId,
                        userName: name,
                        orderId: productId,
                        date: new Date().toISOString()
                    };
                    appState.messages[chatId] = [];
                }

                // Add order
                const order = {
                    id: Date.now(),
                    userId: appState.userId,
                    productId: productId,
                    productName: product.name,
                    price: product.price,
                    customerName: name,
                    customerContact: contact,
                    comment: comment,
                    date: new Date().toISOString()
                };

                appState.orders.push(order);
                saveData();

                closeOrderModal();

                // Show notification
                showNotification('✅', 'Заказ принят!', 'Вас перенаправит в чат');

                // Redirect to chat after 2 seconds
                setTimeout(() => {
                    openChat(chatId);
                }, 2000);
            };

            // Chat input
            document.getElementById('chatSendBtn').onclick = sendMessage;
            document.getElementById('chatInput').onkeypress = (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    sendMessage();
                }
            };

            // Back from chat
            document.getElementById('backFromChatBtn').onclick = () => {
                if (appState.isAdmin) {
                    showPage('admin-chats');
                } else {
                    showPage('chat');
                }
            };

            // Admin products
            document.getElementById('addProductBtn').onclick = () => {
                document.getElementById('addProductModal').classList.add('active');
                document.getElementById('productName').focus();
            };

            document.getElementById('addProductClose').onclick = () => {
                document.getElementById('addProductModal').classList.remove('active');
            };

            document.getElementById('addProductClose2').onclick = () => {
                document.getElementById('addProductModal').classList.remove('active');
            };

            document.getElementById('saveProductBtn').onclick = () => {
                const name = document.getElementById('productName').value.trim();
                const desc = document.getElementById('productDesc').value.trim();
                const price = parseFloat(document.getElementById('productPrice').value);

                if (!name || !desc || !price) {
                    alert('Заполните все поля');
                    return;
                }

                appState.products.push({
                    id: Date.now(),
                    name: name,
                    desc: desc,
                    price: price
                });

                saveData();
                document.getElementById('addProductModal').classList.remove('active');
                renderAdminProducts();
                showNotification('✅', 'Товар добавлен', '');
            };

            document.getElementById('adminProductsBtn').onclick = () => showPage('admin-products');
            document.getElementById('adminProductsBtn2').onclick = () => showPage('admin-products');

            // Order buttons in different pages
            if (document.getElementById('ordersBtn')) {
                document.getElementById('ordersBtn').onclick = () => showPage('orders');
            }
            if (document.getElementById('ordersBtn2')) {
                document.getElementById('ordersBtn2').onclick = () => showPage('orders');
            }
        }

        // Initialize on load
        window.onload = initApp;
    </script>
</body>
</html>
