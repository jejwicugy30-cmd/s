<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
    <title>CloudLab Store</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --primary: #a8ff47;
            --primary-dark: #7a9d2d;
            --secondary: #7b6ef6;
            --bg: #0a0a12;
            --bg-light: #141420;
            --bg-lighter: #1a1a24;
            --border: rgba(255, 255, 255, 0.1);
            --border-light: rgba(255, 255, 255, 0.05);
            --text: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.6);
            --text-dim: rgba(255, 255, 255, 0.4);
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.2);
        }

        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
        }

        .container {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: var(--bg);
        }

        .page {
            display: none;
            flex: 1;
            overflow: hidden;
            flex-direction: column;
        }

        .page.active {
            display: flex;
        }

        .content {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding: 16px;
        }

        .content::-webkit-scrollbar {
            width: 6px;
        }

        .content::-webkit-scrollbar-track {
            background: transparent;
        }

        .content::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 16px;
            border-bottom: 1px solid var(--border-light);
            background: var(--bg-light);
            flex-shrink: 0;
        }

        .header-title {
            font-size: 18px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: 'Unbounded', sans-serif;
        }

        .btn {
            padding: 10px 16px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            min-height: 44px;
        }

        .btn-primary {
            background: var(--primary);
            color: var(--bg);
            font-weight: 600;
        }

        .btn-primary:active {
            background: var(--primary-dark);
        }

        .btn-secondary {
            background: var(--bg-lighter);
            color: var(--text);
            border: 1px solid var(--border);
        }

        .btn-secondary:active {
            background: var(--border);
        }

        .btn-icon {
            width: 44px;
            height: 44px;
            padding: 0;
            border-radius: 8px;
            background: var(--bg-lighter);
            border: 1px solid var(--border);
            color: var(--text);
            font-size: 18px;
        }

        .btn-icon:active {
            background: var(--border);
        }

        .store-header {
            margin-bottom: 20px;
        }

        .store-title {
            font-size: 24px;
            font-weight: 700;
            font-family: 'Unbounded', sans-serif;
            margin-bottom: 8px;
        }

        .store-subtitle {
            color: var(--text-muted);
            font-size: 13px;
        }

        .products-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        .product-card {
            background: var(--bg-lighter);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
        }

        .product-card:active {
            transform: scale(0.98);
            background: var(--border);
        }

        .product-name {
            font-size: 14px;
            font-weight: 600;
            font-family: 'Unbounded', sans-serif;
            margin-bottom: 4px;
            line-height: 1.2;
        }

        .product-desc {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 8px;
            flex: 1;
            line-height: 1.3;
        }

        .product-price {
            font-size: 16px;
            font-weight: 700;
            color: var(--primary);
            font-family: 'Unbounded', sans-serif;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            align-items: flex-end;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--bg-light);
            width: 100%;
            border-radius: 20px 20px 0 0;
            padding: 20px;
            max-height: 80vh;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                transform: translateY(100%);
            }
            to {
                transform: translateY(0);
            }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .modal-title {
            font-size: 18px;
            font-weight: 600;
            font-family: 'Unbounded', sans-serif;
        }

        .modal-close {
            background: none;
            border: none;
            color: var(--text);
            font-size: 24px;
            cursor: pointer;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-body {
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-label {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 6px;
            display: block;
            font-weight: 500;
        }

        .form-input {
            width: 100%;
            padding: 12px 14px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-size: 14px;
            font-family: inherit;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .form-textarea {
            width: 100%;
            padding: 12px 14px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-size: 14px;
            font-family: inherit;
            resize: none;
            min-height: 100px;
        }

        .form-textarea:focus {
            outline: none;
            border-color: var(--primary);
        }

        .chat-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .chat-item {
            background: var(--bg-lighter);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .chat-item:active {
            background: var(--border);
        }

        .chat-item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-item-name {
            font-weight: 600;
            font-size: 14px;
        }

        .chat-item-time {
            font-size: 12px;
            color: var(--text-dim);
        }

        .chat-item-preview {
            font-size: 13px;
            color: var(--text-muted);
            line-height: 1.3;
        }

        .chat-container {
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .messages-list {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: 16px;
        }

        .message {
            display: flex;
            gap: 8px;
            margin-bottom: 4px;
        }

        .message.own {
            justify-content: flex-end;
        }

        .message-bubble {
            background: var(--bg-lighter);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 10px 12px;
            max-width: 80%;
            word-wrap: break-word;
            font-size: 14px;
            line-height: 1.4;
        }

        .message.own .message-bubble {
            background: var(--primary);
            color: var(--bg);
            border-color: var(--primary);
        }

        .chat-input-area {
            display: flex;
            gap: 8px;
            padding: 12px 16px;
            border-top: 1px solid var(--border-light);
            background: var(--bg-light);
            flex-shrink: 0;
        }

        .chat-input {
            flex: 1;
            padding: 10px 12px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 14px;
            font-family: inherit;
            max-height: 80px;
            resize: none;
        }

        .chat-input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .chat-send {
            width: 40px;
            height: 40px;
            background: var(--primary);
            border: none;
            border-radius: 8px;
            color: var(--bg);
            cursor: pointer;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.2s ease;
        }

        .chat-send:active {
            background: var(--primary-dark);
        }

        .admin-chat-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .admin-chat-item {
            background: var(--bg-lighter);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .admin-chat-item:active {
            background: var(--border);
        }

        .admin-chat-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 8px;
        }

        .admin-chat-name {
            font-weight: 600;
            font-size: 15px;
            font-family: 'Unbounded', sans-serif;
        }

        .admin-chat-id {
            font-size: 12px;
            color: var(--primary);
            background: rgba(168, 255, 71, 0.1);
            padding: 2px 6px;
            border-radius: 4px;
        }

        .admin-chat-preview {
            font-size: 13px;
            color: var(--text-muted);
            line-height: 1.3;
            margin-bottom: 6px;
        }

        .admin-chat-time {
            font-size: 12px;
            color: var(--text-dim);
        }

        .footer {
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 12px 0;
            border-top: 1px solid var(--border-light);
            background: var(--bg-light);
            flex-shrink: 0;
        }

        .footer-btn {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            padding: 8px;
            color: var(--text-muted);
            background: none;
            border: none;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s ease;
        }

        .footer-btn.active {
            color: var(--primary);
        }

        .footer-btn-icon {
            font-size: 20px;
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            gap: 12px;
            color: var(--text-muted);
        }

        .empty-icon {
            font-size: 48px;
            opacity: 0.5;
        }

        .empty-text {
            font-size: 14px;
        }

        .category-header {
            font-size: 12px;
            font-weight: 700;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin: 16px 0 8px 0;
            font-family: 'Unbounded', sans-serif;
        }

        .order-item {
            background: var(--bg-lighter);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .order-item-content {
            flex: 1;
            min-width: 0;
        }

        .order-item-name {
            font-family: 'Unbounded', sans-serif;
            font-size: 11px;
            font-weight: 600;
            margin-bottom: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .order-item-price {
            font-size: 11px;
            color: var(--text-muted);
        }

        .order-qty-control {
            display: flex;
            align-items: center;
            gap: 0;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 6px;
            overflow: hidden;
        }

        .order-qty-btn {
            width: 20px;
            height: 20px;
            border: none;
            background: transparent;
            color: var(--text);
            font-size: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .order-qty-display {
            min-width: 16px;
            text-align: center;
            font-family: 'Unbounded', sans-serif;
            font-size: 11px;
            font-weight: 700;
            color: var(--primary);
        }

        @media (max-width: 480px) {
            .content {
                padding: 12px;
            }

            .products-grid {
                grid-template-columns: 1fr;
                gap: 10px;
            }

            .product-card {
                padding: 10px;
            }

            .header {
                padding: 10px 12px;
            }

            .modal-content {
                padding: 16px;
            }

            .store-title {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- КЛИЕНТ: МАГАЗИН -->
        <div id="storePage" class="page active">
            <div class="header">
                <div class="header-title">
                    <span>🛍️</span>
                    <span>CloudLab</span>
                </div>
            </div>
            <div class="content">
                <div class="store-header">
                    <div class="store-title">Товары</div>
                    <div class="store-subtitle">Выберите товар для заказа</div>
                </div>
                <div class="products-grid" id="productsGrid"></div>
            </div>
            <div class="footer">
                <button class="footer-btn active" data-page="store">
                    <span class="footer-btn-icon">🛍️</span>
                    <span>Магазин</span>
                </button>
            </div>
        </div>

        <!-- АДМИН: ЧАТЫ -->
        <div id="adminChatListPage" class="page">
            <div class="header">
                <div class="header-title">
                    <span>📋</span>
                    <span>Чаты с клиентами</span>
                </div>
            </div>
            <div class="content">
                <div class="admin-chat-list" id="adminChatList"></div>
            </div>
        </div>

        <!-- АДМИН: ЧАТ -->
        <div id="chatConvPage" class="page">
            <div class="header">
                <button class="btn-icon" id="backFromChatBtn">←</button>
                <div class="header-title" id="chatConvTitle"></div>
            </div>
            <div class="chat-container">
                <div class="messages-list" id="messagesList"></div>
                <div class="chat-input-area">
                    <input type="text" class="chat-input" id="chatInput" placeholder="Сообщение...">
                    <button class="chat-send" id="chatSendBtn">→</button>
                </div>
            </div>
        </div>
    </div>

    <!-- МОДАЛЬ ЗАКАЗА -->
    <div id="orderModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title">Оформление заказа</div>
                <button class="modal-close" id="orderModalClose">✕</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <div class="form-label">Товар</div>
                    <div id="modalProductName" style="font-weight: 600; color: var(--primary); padding: 12px; background: var(--bg); border-radius: 8px;"></div>
                </div>
                <div class="form-group">
                    <label class="form-label">Ваше имя</label>
                    <input type="text" class="form-input" id="customerName" placeholder="Введите имя">
                </div>
                <div class="form-group">
                    <label class="form-label">Номер телефона</label>
                    <input type="tel" class="form-input" id="customerPhone" placeholder="+7 (___) ___-__-__" inputmode="tel">
                </div>
                <div class="form-group">
                    <label class="form-label">Комментарий</label>
                    <textarea class="form-textarea" id="orderComment" placeholder="Ваши пожелания..."></textarea>
                </div>
                
                <div class="category-header">Товары в заказе</div>
                <div id="orderItemsList"></div>
            </div>
            <div style="display: flex; gap: 8px;">
                <button class="btn btn-secondary" id="orderModalClose2" style="flex: 1;">Отмена</button>
                <button class="btn btn-primary" id="submitOrderBtn" style="flex: 1;">Оформить</button>
            </div>
        </div>
    </div>

    <script>
        const ADMIN_ID = 7705124098;
        const APP_STORAGE_KEY = 'cloudlab_data';

        let appState = {
            currentPage: 'store',
            userId: null,
            isAdmin: false,
            currentChat: null,
            products: [],
            orders: [],
            chats: {},
            messages: {},
            cart: {}
        };

        function initApp() {
            if (window.Telegram?.WebApp) {
                const tg = window.Telegram.WebApp;
                tg.ready();
                tg.expand();
                
                const user = tg.initDataUnsafe?.user;
                if (user) {
                    appState.userId = user.id;
                    appState.isAdmin = user.id === ADMIN_ID;
                }
            }

            if (!appState.userId) {
                appState.userId = Math.random().toString(36).substr(2, 9);
            }

            loadData();

            if (appState.products.length === 0) {
                appState.products = [
                    { id: 1, name: 'Облако Pro', desc: 'Мощное облачное решение', price: 999, category: 'cloud' },
                    { id: 2, name: 'Облако Start', desc: 'Начальный пакет', price: 299, category: 'cloud' },
                    { id: 3, name: 'VPS сервер', desc: 'Высокопроизводительный VPS', price: 1999, category: 'vps' },
                    { id: 4, name: 'CDN сервис', desc: 'Глобальная сеть доставки', price: 599, category: 'cdn' }
                ];
                saveData();
            }

            setupEventListeners();

            if (appState.isAdmin) {
                showAdminPage();
            } else {
                showClientPage();
            }
        }

        function setupEventListeners() {
            document.getElementById('orderModalClose').addEventListener('click', closeOrderModal);
            document.getElementById('orderModalClose2').addEventListener('click', closeOrderModal);
            document.getElementById('submitOrderBtn').addEventListener('click', submitOrder);
            document.getElementById('customerPhone').addEventListener('input', formatPhoneInput);
            document.getElementById('backFromChatBtn').addEventListener('click', () => showAdminPage());
            document.getElementById('chatSendBtn').addEventListener('click', sendChatMessage);
            document.getElementById('chatInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    sendChatMessage();
                }
            });
        }

        function showClientPage() {
            document.getElementById('storePage').classList.add('active');
            renderStore();
        }

        function showAdminPage() {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('adminChatListPage').classList.add('active');
            renderAdminChatList();
        }

        function renderStore() {
            const grid = document.getElementById('productsGrid');
            grid.innerHTML = '';

            appState.products.forEach(product => {
                const card = document.createElement('div');
                card.className = 'product-card';
                card.innerHTML = `
                    <div class="product-name">${product.name}</div>
                    <div class="product-desc">${product.desc}</div>
                    <div class="product-price">${product.price}₽</div>
                `;
                card.onclick = () => openOrderModal(product);
                grid.appendChild(card);
            });
        }

        function formatPhoneInput(e) {
            let v = e.target.value.replace(/\D/g, '');
            if (v.length === 0) {
                e.target.value = '';
                return;
            }
            if (v.startsWith('8')) v = '7' + v.slice(1);
            else if (!v.startsWith('7')) v = '7' + v;

            if (v.length > 11) v = v.slice(0, 11);

            let formatted = '+7';
            if (v.length > 1) formatted += ' (' + v.slice(1, 4);
            if (v.length >= 4) formatted += ') ' + v.slice(4, 7);
            if (v.length >= 7) formatted += '-' + v.slice(7, 9);
            if (v.length >= 9) formatted += '-' + v.slice(9, 11);
            e.target.value = formatted;
        }

        function openOrderModal(product) {
            appState.cart = { [product.id]: 1 };
            document.getElementById('modalProductName').textContent = product.name + ' - ' + product.price + '₽';
            document.getElementById('customerName').value = '';
            document.getElementById('customerPhone').value = '';
            document.getElementById('orderComment').value = '';
            renderOrderItems();
            document.getElementById('orderModal').classList.add('active');
            document.getElementById('orderModal').dataset.productId = product.id;
        }

        function renderOrderItems() {
            const itemsList = document.getElementById('orderItemsList');
            itemsList.innerHTML = '';

            const categories = {};
            Object.entries(appState.cart).forEach(([productId, qty]) => {
                if (qty > 0) {
                    const product = appState.products.find(p => p.id == productId);
                    if (product) {
                        if (!categories[product.category]) categories[product.category] = [];
                        categories[product.category].push({ product, qty });
                    }
                }
            });

            Object.entries(categories).forEach(([cat, items]) => {
                const catName = cat === 'cloud' ? 'Облачные' : cat === 'vps' ? 'VPS' : 'CDN';
                itemsList.innerHTML += `<div class="category-header">${catName}</div>`;
                
                items.forEach(({ product, qty }) => {
                    itemsList.innerHTML += `
                        <div class="order-item">
                            <div class="order-item-content">
                                <div class="order-item-name">${product.name}</div>
                                <div class="order-item-price">${(product.price * qty).toLocaleString('ru')} ₽</div>
                            </div>
                            <div class="order-qty-control">
                                <button class="order-qty-btn" onclick="changeOrderQty(${product.id}, -1)">−</button>
                                <div class="order-qty-display">${qty}</div>
                                <button class="order-qty-btn" onclick="changeOrderQty(${product.id}, 1)">+</button>
                            </div>
                        </div>
                    `;
                });
            });
        }

        function changeOrderQty(productId, delta) {
            appState.cart[productId] = (appState.cart[productId] || 0) + delta;
            if (appState.cart[productId] <= 0) delete appState.cart[productId];
            renderOrderItems();
        }

        function closeOrderModal() {
            document.getElementById('orderModal').classList.remove('active');
        }

        function submitOrder() {
            const name = document.getElementById('customerName').value.trim();
            const phone = document.getElementById('customerPhone').value.trim();
            const comment = document.getElementById('orderComment').value.trim();

            if (!name) {
                alert('Введите имя');
                return;
            }
            if (!phone || phone.replace(/\D/g, '').length < 11) {
                alert('Введите корректный н��мер телефона');
                return;
            }

            const order = {
                id: Math.random().toString(36).substr(2, 9),
                userId: appState.userId,
                name,
                phone,
                comment,
                items: appState.cart,
                timestamp: new Date().toISOString()
            };

            appState.orders.push(order);
            saveData();
            closeOrderModal();
            alert('Заказ принят! ID: ' + order.id);
        }

        function renderAdminChatList() {
            const chatList = document.getElementById('adminChatList');
            chatList.innerHTML = '';

            if (!appState.chats || Object.keys(appState.chats).length === 0) {
                chatList.innerHTML = '<div class="empty-state"><div class="empty-icon">💬</div><div class="empty-text">Нет чатов</div></div>';
                return;
            }

            Object.entries(appState.chats).forEach(([userId, chat]) => {
                const lastMsg = chat.messages && chat.messages[chat.messages.length - 1];
                const div = document.createElement('div');
                div.className = 'admin-chat-item';
                div.onclick = () => openAdminChat(userId, chat);
                div.innerHTML = `
                    <div class="admin-chat-header">
                        <div class="admin-chat-name">${chat.name}</div>
                        <div class="admin-chat-id">${userId}</div>
                    </div>
                    <div class="admin-chat-preview">${lastMsg ? lastMsg.text : 'Нет сообщений'}</div>
                    <div class="admin-chat-time">${lastMsg ? new Date(lastMsg.timestamp).toLocaleTimeString('ru') : ''}</div>
                `;
                chatList.appendChild(div);
            });
        }

        function openAdminChat(userId, chat) {
            appState.currentChat = { userId, ...chat };
            document.getElementById('chatConvTitle').textContent = chat.name;
            renderChatMessages();
            document.getElementById('adminChatListPage').classList.remove('active');
            document.getElementById('chatConvPage').classList.add('active');
        }

        function renderChatMessages() {
            const messagesList = document.getElementById('messagesList');
            messagesList.innerHTML = '';

            if (!appState.currentChat.messages) {
                appState.currentChat.messages = [];
            }

            appState.currentChat.messages.forEach(msg => {
                const div = document.createElement('div');
                div.className = 'message ' + (msg.isAdmin ? 'own' : '');
                div.innerHTML = `
                    <div class="message-bubble">${msg.text}</div>
                `;
                messagesList.appendChild(div);
            });

            messagesList.scrollTop = messagesList.scrollHeight;
        }

        function sendChatMessage() {
            const input = document.getElementById('chatInput');
            const text = input.value.trim();
            if (!text) return;

            if (!appState.currentChat.messages) {
                appState.currentChat.messages = [];
            }

            appState.currentChat.messages.push({
                text,
                isAdmin: true,
                timestamp: new Date().toISOString()
            });

            input.value = '';
            renderChatMessages();
            saveData();
        }

        function loadData() {
            const data = localStorage.getItem(APP_STORAGE_KEY);
            if (data) {
                const parsed = JSON.parse(data);
                appState = { ...appState, ...parsed };
            }
        }

        function saveData() {
            localStorage.setItem(APP_STORAGE_KEY, JSON.stringify(appState));
        }

        initApp();
    </script>
</body>
</html>
